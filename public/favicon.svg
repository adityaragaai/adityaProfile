<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1e1e2e"/>

  <!-- Graduation cap board (flat top) -->
  <polygon points="32,14 58,24 32,34 6,24" fill="#a78bfa"/>

  <!-- Cap body (mortarboard top) -->
  <polygon points="32,14 58,24 32,34 6,24" fill="#7c3aed" opacity="0.3"/>
  <polygon points="32,14 58,24 32,34 6,24" fill="none" stroke="#c4b5fd" stroke-width="1" stroke-linejoin="round"/>

  <!-- Cap highlight -->
  <polygon points="32,14 58,24 32,29 6,24" fill="#a78bfa"/>

  <!-- Left side of cap hanging down -->
  <polygon points="6,24 20,30 20,42 6,36" fill="#7c3aed"/>

  <!-- Right side of cap hanging down -->
  <polygon points="58,24 44,30 44,42 58,36" fill="#7c3aed"/>

  <!-- Diploma scroll under cap -->
  <rect x="22" y="40" width="20" height="13" rx="2" fill="#6d28d9"/>
  <rect x="22" y="40" width="20" height="13" rx="2" fill="none" stroke="#c4b5fd" stroke-width="0.8"/>
  <line x1="26" y1="45" x2="38" y2="45" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="48.5" x2="38" y2="48.5" stroke="#c4b5fd" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Tassel string -->
  <line x1="58" y1="24" x2="58" y2="36" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <circle cx="58" cy="37" r="2.5" fill="#fbbf24"/>
  <line x1="55.5" y1="39" x2="53" y2="44" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="39.5" x2="58" y2="45" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60.5" y1="39" x2="63" y2="44" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
</svg>
